name: Build and Push to ECR

on:
    push:
        # pull_request:
        #     branches: ['main', 'dev']

        branches: ['main']

jobs:
    build_scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the code
              uses: actions/checkout@v3
            - name: Trivy Scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                scan-type: 'fs'
                severity: 'CRITICAL,HIGH'
                exit-code: '1'
            - name: Build Docker Image
              run: docker build -t 366019841221.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .
            - name: Scan Docker Image with Trivy
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                scan-type: 'image'
                image-ref: '366019841221.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest'
                severity: 'CRITICAL,HIGH'
                exit-code: '1'
                format: 'table'
            - name: Push image to ECR
              run: echo "Pushing image to ECR"
              
                


  